text-color=#f4fd22
border-color=#f4fd22ee
background-color=#0b0a0df2
width=420
height=110
padding=12,16
border-size=3
border-radius=5
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32
format=<b>%s</b>\n<span foreground="#dadbd6">%b</span>

[urgency=critical]
border-color=#fff78eee
default-timeout=0
layer=overlay

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
